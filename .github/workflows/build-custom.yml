name: Build Custom Docker Images

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Image tag (e.g. latest, custom-20260312)'
        required: true
        default: 'latest'
        type: string

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build ${{ matrix.app }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: api
            dockerfile: ./apps/api/Dockerfile.slim
          - app: web
            dockerfile: ./apps/web/Dockerfile
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare image name
        id: prep
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "image=${OWNER}/refly-${{ matrix.app }}" >> $GITHUB_OUTPUT

      - name: Patch API Dockerfile (fix upstream build issues)
        if: matrix.app == 'api'
        run: |
          sed -i 's/font-noto-extra/fonts-noto-cjk-extra/' ./apps/api/Dockerfile.slim
          sed -i 's/pnpm --filter api deploy --prod/pnpm --filter api deploy --prod --legacy/' ./apps/api/Dockerfile.slim

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.prep.outputs.image }}:${{ inputs.version }}
            ${{ env.REGISTRY }}/${{ steps.prep.outputs.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

      - name: Generate summary
        run: |
          IMAGE="${{ steps.prep.outputs.image }}"
          VERSION="${{ inputs.version }}"
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## Docker Image Published: ${{ matrix.app }}
          **Tag:** \`${VERSION}\`
          **Image:** \`ghcr.io/${IMAGE}:${VERSION}\`
          ### Pull
          \`\`\`bash
          docker pull ghcr.io/${IMAGE}:${VERSION}
          \`\`\`
          EOF
